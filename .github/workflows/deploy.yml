# ═══════════════════════════════════════════════════════════
# End-to-End Docker Hub CI/CD Pipeline
# Build: Runs on GitHub Servers (Safe for VPS CPU)
# Deploy: Runs on VPS (Low CPU Pull & Run)
# ═══════════════════════════════════════════════════════════

name: Deploy to VPS (via Docker Hub)

on:
  push:
    branches: [main] # Jab bhi main branch par push hoga, ye trigger hoga
  workflow_dispatch: # Manual trigger ke liye option

jobs:
  # ── Job 1: Build & Push ──────────────────────────────────────
  # Ye poora task GitHub ke servers par chalega
  build-and-push:
    name: Build Image & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # soumyajit12
          password: ${{ secrets.DOCKER_PASSWORD }} # Access Token

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Dynamic tag use kar rahe hain hum
          tags: ${{ secrets.DOCKER_USERNAME }}/notification_service_backend:latest
          cache-from: type=gha # Build fast karne ke liye cache
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS ─────────────────────────────────────
  # Ye VPS par sirf commands bhejega (CPU load minimal rahega)
  deploy:
    name: Pull & Restart on VPS
    needs: build-and-push # Sirf tabhi chalega jab build successful ho
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Update Containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Variables ko SSH session mein pass karna zaroori hai
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            # Docker Compose ko dynamic username batane ke liye
            export DOCKER_USERNAME=$DOCKER_USERNAME

            # Docker Hub Login on VPS
            echo "$DOCKER_PASSWORD" | docker login -u $DOCKER_USERNAME --password-stdin

            # Step 1: Nayi image pull karein (Bahut fast process)
            echo "--- Pulling latest image from Docker Hub ---"
            docker compose -f docker-compose.prod.yml pull

            # Step 2: Purane containers replace karein
            echo "--- Restarting services ---"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Step 3: Health Check (Port 5000 check)
            echo "--- Verifying Deployment on Port 5000 ---"
            sleep 15
            curl -f http://localhost:5000/health || (echo "FAILED: App not responding" && exit 1)

            # Step 4: Cleanup (Purani images ko uda dena taaki 100GB space bacha rahe)
            echo "--- Cleaning up old Docker layers ---"
            docker image prune -f

            echo "Deployment successful! CPU load is stable."
