name: Deploy to VPS (End-to-End Fix)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & Push ────────────────────────────────────
  build-and-push:
    name: Build Image & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification_service_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS ─────────────────────────────────────
  deploy:
    name: Pull & Restart on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            # Variables ko explicitly export karein
            export DOCKER_USERNAME="${DOCKER_USERNAME}"
            export DOCKER_PASSWORD="${DOCKER_PASSWORD}"

            # 1. Check if password is empty (Prevents Non-TTY error)
            if [ -z "$DOCKER_PASSWORD" ]; then
              echo "❌ ERROR: DOCKER_PASSWORD is empty! GitHub Secrets check karein."
              exit 1
            fi

            # 2. Docker Login (Secure pipeline login)
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            # 3. Pull and Up
            echo "--- Pulling latest image ---"
            docker compose -f docker-compose.prod.yml pull

            echo "--- Restarting services ---"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 4. Wait and Verify
            echo "--- Verifying Deployment ---"
            sleep 15

            # Agar app crash hoti hai, toh yeh if-condition logs print karegi
            if ! curl -f http://localhost:5000/health; then
              echo "❌ FAILED: App is crashing or not responding on Port 5000."
              echo "========== API CONTAINER LOGS =========="
              docker compose -f docker-compose.prod.yml logs api --tail=50
              echo "========================================"
              exit 1
            fi

            # 5. Cleanup (Disk space management)
            echo "✅ Health check passed. Cleaning up old images..."
            docker image prune -f
